name: Release Extension

on:
  push:
    branches: [main]

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Read version from metadata.json
        id: meta
        run: |
          VERSION=$(jq -r '.version' metadata.json)
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=v$VERSION" >> "$GITHUB_OUTPUT"

      - name: Check if release already exists
        id: check
        run: |
          if gh release view "v${{ steps.meta.outputs.version }}" > /dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Install dependencies
        if: steps.check.outputs.exists == 'false'
        run: npm ci

      - name: Build TypeScript
        if: steps.check.outputs.exists == 'false'
        run: npm run build

      - name: Copy assets to dist
        if: steps.check.outputs.exists == 'false'
        run: |
          cp metadata.json dist/
          cp -r schemas dist/
          cp -r img dist/

      - name: Compile schemas
        if: steps.check.outputs.exists == 'false'
        run: glib-compile-schemas dist/schemas/

      - name: Package extension
        if: steps.check.outputs.exists == 'false'
        run: |
          UUID=$(jq -r '.uuid' metadata.json)
          cd dist && zip -r "../${UUID}.zip" .

      - name: Create release
        if: steps.check.outputs.exists == 'false'
        run: |
          UUID=$(jq -r '.uuid' metadata.json)
          gh release create "${{ steps.meta.outputs.tag }}" \
            "${UUID}.zip" \
            --title "Version ${{ steps.meta.outputs.version }}" \
            --generate-notes
        env:
          GH_TOKEN: ${{ github.token }}
